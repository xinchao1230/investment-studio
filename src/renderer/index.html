<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval';
        style-src 'self' 'unsafe-inline' https:;
        img-src 'self' data: blob: https: file:;
        font-src 'self' data: https:;
        connect-src 'self' https:<%= connectSrcExtra %>;
        media-src 'self' file:;
        frame-src 'self' file: blob: https://www.youtube.com https://youtube.com;
    ">
    <title>
        <%= htmlWebpackPlugin.options.title %>
    </title>
    <script>
        // Output logs at the beginning of the page
        console.log('🔥 [HTML] Page script execution started');
        console.log('🔥 [HTML] Current time:', new Date().toLocaleString());
        console.log('🔥 [HTML] User agent:', navigator.userAgent);

        // Global polyfill for Electron renderer process
        if (typeof global === 'undefined') {
            var global = globalThis;
        }
        window.global = global;

        // Polyfill removed: Webpack 5 has built-in support for require() in dev mode
        // The simplistic polyfill was breaking HMR by returning empty objects

        console.log('🔥 [HTML] Global variables setup completed');
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #FFFBF8 0%, #FFFFFF 50%, #F8F4F1 100%);
            color: #1c1c1c;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #FFFBF8 0%, #FFFFFF 50%, #F8F4F1 100%);
        }

        /* No HTML boot splash: the Electron main process keeps the window
           hidden until the renderer signals it has mounted (see
           `window:rendererReady` IPC in main.ts), so users never see the
           pre-React HTML. The light gradient background above matches the
           StartupPage gradient (src/renderer/styles/StartupPage.css) so:
             1. When the window finally shows, the framebuffer behind React's
                first paint already matches the page — no dark flash.
             2. The rare 8s-fallback case (renderer never signals) shows the
                same brand-consistent background instead of a dark hole. */
    </style>
</head>
<body>
    <div id="root"></div>
    <%- entryScript %>
</body>
</html>
