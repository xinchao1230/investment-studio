<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval'; 
        style-src 'self' 'unsafe-inline' https:; 
        img-src 'self' data: https: file:;
        font-src 'self' data: https:;
        connect-src 'self' https:;
        media-src 'self' file:;
        frame-src 'self' file: blob: https://view.officeapps.live.com https://*.microsoft.com https://www.youtube.com https://youtube.com;
    ">
    <title>
        <%= htmlWebpackPlugin.options.title %>
    </title>
    <script>
        // Output logs at the beginning of the page
        console.log('🔥 [HTML] Page script execution started');
        console.log('🔥 [HTML] Current time:', new Date().toLocaleString());
        console.log('🔥 [HTML] User agent:', navigator.userAgent);
        
        // Global polyfill for Electron renderer process
        if (typeof global === 'undefined') {
            var global = globalThis;
        }
        window.global = global;
        
        // Polyfill removed: Webpack 5 has built-in support for require() in dev mode
        // The simplistic polyfill was breaking HMR by returning empty objects
        
        console.log('🔥 [HTML] Global variables setup completed');
    </script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #fafafa 0%, #ffffff 50%, #f5f5f5 100%);
            color: #1a1a1a;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 16px;
            font-weight: 500;
            color: #525252;
            letter-spacing: 0.01em;
        }
        
        .loading::after {
            content: '';
            width: 18px;
            height: 18px;
            margin-left: 12px;
            border: 2px solid rgba(14, 165, 233, 0.2);
            border-top: 2px solid #0ea5e9;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading">Starting <%= htmlWebpackPlugin.options.productName %>
        </div>
    </div>
</body>
</html>
